
server:
  port: ${GATEWAY_SERVER_PORT:8088}

# OAuth2/인증 디버깅 시 로그 상세 출력 (필요 시 DEBUG → TRACE)
logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    org.springframework.security.web: DEBUG
    reactor.netty.http.client: INFO

---


keycloak-client:
  server-url: ${KEYCLOAK_CLIENT_SERVER_URL:http://localhost:8080}
  realm: ${KEYCLOAK_CLIENT_REALM:uengine}

spring:
  profiles: default
  cloud:
    gateway:
      routes:
        - id: execution
          uri: ${EXECUTION_SERVICE_URL:http://localhost:8000}
          predicates:
            - Path=/complete/**, /vision-complete/**, /execution/**
          filters:
            - RewritePath=/execution/?(?<segment>.*), /$\{segment}
        - id: definition-servicce
          uri: ${DEFINITION_SERVICE_URL:http://localhost:9093}
          predicates:
            - Path=/definition/**, /version/**, /versions/**
        - id: instance-servicce
          uri: ${PROCESS_SERVICE_URL:http://localhost:9094}
          predicates:
            - Path=/worklist/**, /test/**, /instance/**, /work-item/** , /instances/**, /dry-run/**, /validate/**, /start-and-complete
        # - id: inventory-service
        #   uri: http://localhost:8080
        #   predicates: 
        #     - Path=/inventories/**, /url-test/**
        - id: frontend
          uri: ${FRONTEND_URL:http://localhost:5173}
          predicates:
            - Path=/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - "*"
            allowedHeaders:
              - "*"
            allowCredentials: true

---

spring:
  profiles: docker
  cloud:
    gateway:
      routes:
        - id: execution
          uri: ${EXECUTION_SERVICE_URL:http://localhost:8000}
          predicates:
            - Path=/complete/**, /vision-complete/**, /execution/**
          filters:
            - RewritePath=/execution/?(?<segment>.*), /$\{segment}
        # definition-service 컨테이너는 Dockerfile에서 8080 리스닝
        - id: definition-service
          uri: ${DEFINITION_SERVICE_URL:http://definition-service:8080}
          predicates:
            - Path=/definition/**, /version/**, /versions/**
        - id: instance-service
          uri: ${PROCESS_SERVICE_URL:http://process-service:8080}
          predicates:
            - Path=/worklist/**, /test/**, /instance/**, /work-item/**, /instances/**, /dry-run/**, /validate/**, /start-and-complete
        - id: frontend
          uri: ${FRONTEND_URL:http://frontend:8080}
          predicates:
            - Path=/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - "*"
            allowedHeaders:
              - "*"
            allowCredentials: true
  security:
    oauth2:
      client:
        provider:
          keycloak:
            # 브라우저 리다이렉트용. 나머지는 서버→Keycloak용 keycloak:8080
            authorization-uri: ${KEYCLOAK_BROWSER_AUTH_URL:http://localhost:8080}/realms/${KEYCLOAK_CLIENT_REALM:uengine}/protocol/openid-connect/auth
            token-uri: ${KEYCLOAK_CLIENT_SERVER_URL:http://keycloak:8080}/realms/${KEYCLOAK_CLIENT_REALM:uengine}/protocol/openid-connect/token
            user-info-uri: ${KEYCLOAK_CLIENT_SERVER_URL:http://keycloak:8080}/realms/${KEYCLOAK_CLIENT_REALM:uengine}/protocol/openid-connect/userinfo
            jwk-set-uri: ${KEYCLOAK_CLIENT_SERVER_URL:http://keycloak:8080}/realms/${KEYCLOAK_CLIENT_REALM:uengine}/protocol/openid-connect/certs
            user-name-attribute: preferred_username
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID:uengine}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:66LpF19OpkpgKKpWHdgiCEKisx5AXqLA}
            redirect-uri: ${KEYCLOAK_REDIRECT_URI:http://localhost:8088/login/oauth2/code/keycloak}
            authorization-grant-type: authorization_code
            scope: openid, profile
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_CLIENT_SERVER_URL:http://keycloak:8080}/realms/${KEYCLOAK_CLIENT_REALM:uengine}/protocol/openid-connect/certs

server:
  port: ${GATEWAY_SERVER_PORT:8080}
