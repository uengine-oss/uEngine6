server:
  port: ${DEFINITION_SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false
spring:
  application:
    name: definition
---

uengine:
  definition:
    basePath: ${UENGINE_BASEPATH:/Users/kimsanghoon/IdeaProjects/uEngine5-uEngine6}
    expose-actor-names: ${UENGINE_DEFINITION_EXPOSE_ACTOR_NAMES:true}
    
    
# default 프로필은 H2 메모리 DB 사용, oracle 프로필은 Oracle DB 사용
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:oracle}
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none # update(default) | validate | none
    properties:
      hibernate:
        hbm2ddl.auto: none  # Hibernate 직접 설정 (스키마 검증 비활성화)
        show_sql: true
        format_sql: true

  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
        streams:
          binder:
            configuration:
              default:
                key:
                  serde: org.apache.kafka.common.serialization.Serdes$StringSerde
                value:
                  serde: org.apache.kafka.common.serialization.Serdes$StringSerde
      bindings:
        bpm-in:
          group: definition
          destination: bpm-topic
          contentType: application/json
        bpm-out:
          destination: bpm-topic
          contentType: application/json
          

logging:
  level:
    org.hibernate.type: trace
    org.springframework.cloud: debug


server:
  port: ${DEFINITION_SERVER_PORT:9093}

---

spring:
  profiles: docker
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
        streams:
          binder:
            configuration:
              default:
                key:
                  serde: org.apache.kafka.common.serialization.Serdes$StringSerde
                value:
                  serde: org.apache.kafka.common.serialization.Serdes$StringSerde
      bindings:
        bpm-in:
          destination: bpm.topic
          contentType: application/json

---
# DB: Oracle (oracle 폴더 Docker 실행 후 SPRING_PROFILES_ACTIVE=oracle)
# Oracle 컨테이너가 완전히 뜬 뒤(2~3분) 앱 실행. system/oracle = docker-compose ORACLE_PASSWORD.
# (APP_USER uengine는 첫 기동 시에만 생성되므로, 크래시 후 재기동한 DB는 system 사용)
# 스키마는 `oracle/scripts/schema.sql`(운영/PAL_DB) 또는 Docker용 `oracle/scripts/schema-docker.sql` 적용 후 기동. ddl-auto: none.
spring:
  profiles: oracle
  datasource:
    url: jdbc:oracle:thin:@${ORACLE_HOST:localhost}:${ORACLE_PORT:1521}:${ORACLE_SERVICE:XE}
    username: ${ORACLE_USER:system}
    password: ${ORACLE_PASSWORD:oracle}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 30000
  jpa:
    database-platform: org.hibernate.dialect.Oracle12cDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        hbm2ddl.auto: none


