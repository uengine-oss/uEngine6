server:
  port: ${PROCESS_SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false
spring:
  application:
    name: process
  main:
    allow-bean-definition-overriding: true
---
uengine:
  definition:
    basePath: ${UENGINE_BASEPATH:/Users/kimsanghoon/IdeaProjects/uEngine5-uEngine6}
  # 감사 로그: 저장소 유연 구성 (jpa | file | composite | none)
  audit:
    # sink: jpa      # Method 1: DB (default)
    sink: file       # Method 2: File (경로는 file.basePath만 사용, definition과 별도)
    file:
      basePath: ${UENGINE_AUDIT_BASEPATH:/Users/kimsanghoon/IdeaProjects/uEngine5-uEngine6/bpm-audit-log}
      format: json
    # sink: composite # Method 3: Composite
    # sinkNames: jpa,file

# default 프로필은 H2 메모리 DB 사용, oracle 프로필은 Oracle DB 사용 (definition-service와 동일)
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:oracle}
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none # update(default) | validate | none
    properties:
      hibernate:
        hbm2ddl.auto: none  # Hibernate 직접 설정 (스키마 검증 비활성화)
        show_sql: true
        format_sql: true

  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
        streams:
          binder:
            configuration:
              default:
                key:
                  serde: org.apache.kafka.common.serialization.Serdes$StringSerde
                value:
                  serde: org.apache.kafka.common.serialization.Serdes$StringSerde
      bindings:
        bpm-in:
          group: bpm
          destination: bpm-topic
          contentType: application/json
        bpm-out:
          destination: bpm-topic
          contentType: application/json
        bpm-brodcast:
          destination: bpm-brodcast
          contentType: application/json

logging:
  level:
    org.hibernate.type: trace
    org.springframework.cloud: debug

server:
  port: ${PROCESS_SERVER_PORT:9094}

filter:
  payload:
    enabled: true

mail:
  enabled: true
  smtp:
    host: ${MAIL_SMTP_HOST:smtp.gmail.com}
    port: ${MAIL_SMTP_PORT:587}
    auth: true
    starttls:
      enable: true
    ssl:
      trust: ${MAIL_SMTP_SSL_TRUST:smtp.gmail.com}
    username: ${MAIL_USERNAME:lee}
    password: ${MAIL_PASSWORD:123}

keycloak:
  url: ${KEYCLOAK_URL:http://localhost:9090}
  realm: ${KEYCLOAK_REALM:master}
  clientId: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
  username: ${KEYCLOAK_USERNAME}
  password: ${KEYCLOAK_PASSWORD}



---

spring:
  profiles: docker
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
        streams:
          binder:
            configuration:
              default:
                key:
                  serde: org.apache.kafka.common.serialization.Serdes$StringSerde
                value:
                  serde: org.apache.kafka.common.serialization.Serdes$StringSerde
      bindings:
        bpm-in:
          destination: bpm.topic
          contentType: application/json
        bpm-out:
          destination: bpm.topic
          contentType: application/json
        bpm-brodcast:
          destination: bpm-brodcast
          contentType: application/json

---
# DB: Oracle (definition-service와 동일. oracle 폴더 Docker 실행 후 SPRING_PROFILES_ACTIVE=oracle,docker)
# Oracle 컨테이너가 완전히 뜬 뒤(2~3분) 앱 실행. system/oracle = docker-compose ORACLE_PASSWORD.
# 스키마는 oracle/scripts/schema.sql(운영) 또는 schema-docker.sql 적용 후 기동. ddl-auto: none.
spring:
  profiles: oracle
  datasource:
    url: jdbc:oracle:thin:@${ORACLE_HOST:localhost}:${ORACLE_PORT:1521}:${ORACLE_SERVICE:XE}
    username: ${ORACLE_USER:system}
    password: ${ORACLE_PASSWORD:oracle}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 30000
  jpa:
    database-platform: org.uengine.five.config.Oracle12cDialectWithRegexp
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        hbm2ddl.auto: none

uengine:
  definition:
    service:
      mode: remote