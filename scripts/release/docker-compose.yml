# release 폴더용: 같은 폴더의 tar 로드 후 실행
# 사용: 1) load-images.sh 실행  2) docker compose up -d
# 이미지: keycloak-bundle-*.tar(keycloak + uengine-zookeeper + uengine-kafka), uengine-release-*.tar, process-gpt-vue3-*.tar 로드한 뒤 사용
# Zookeeper/Kafka는 keycloak-bundle에 포함된 uengine-zookeeper:버전, uengine-kafka:버전 사용

services:
  zookeeper:
    image: uengine-zookeeper:1.1.0
    container_name: release-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT:-2181}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME:-2000}
    networks:
      - release-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: uengine-kafka:1.1.0
    container_name: release-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID:-1}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT:-zookeeper:2181}
      KAFKA_LISTENERS: ${KAFKA_LISTENERS:-PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS:-PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:-PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME:-PLAINTEXT_INTERNAL}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:-1}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "${KAFKA_AUTO_CREATE_TOPICS_ENABLE:-true}"
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xmx512m -Xms256m}
    networks:
      - release-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  keycloak:
    image: keycloak:1.1.0
    container_name: release-keycloak
    ports:
      - "${KEYCLOAK_HOST_PORT:-8080}:${KEYCLOAK_CONTAINER_PORT:-8080}"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "${KC_HTTP_ENABLED:-true}"
      KC_PROXY: ${KC_PROXY:-edge}
      # 브라우저·백채널 동일 issuer로 맞춤 → userinfo invalid_token 방지
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: "${KC_HOSTNAME_PORT:-8080}"
      # 인증 실패 원인 확인용 로그 (DEBUG; 운영 시 INFO로 변경)
      KC_LOG_LEVEL: ${KC_LOG_LEVEL:-DEBUG}
      KC_LOG_LEVEL_ORG_KEYCLOAK_SERVICES: ${KC_LOG_LEVEL_ORG_KEYCLOAK_SERVICES:-DEBUG}
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    command: ["start-dev", "--import-realm"]
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 || exit 1"]
      start_period: 90s
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - release-network

  definition-service:
    image: definition-service:1.1.0
    container_name: release-definition-service
    depends_on:
      kafka:
        condition: service_healthy
    # oracle 프로필 없으면 H2 사용 → TB_BPM_* 테이블 없어 에러. Oracle 쓰려면 oracle,docker 둘 다 활성화.
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-oracle,docker}
      ORACLE_HOST: ${ORACLE_HOST:-host.docker.internal}
      ORACLE_PORT: ${ORACLE_PORT:-1521}
      ORACLE_SERVICE: ${ORACLE_SERVICE:-XE}
      ORACLE_USER: ${ORACLE_USER:-system}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-oracle}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      DEFINITION_SERVER_PORT: ${DEFINITION_SERVER_PORT:-8080}
    networks:
      - release-network

  process-service:
    image: process-service:1.1.0
    container_name: release-process-service
    depends_on:
      kafka:
        condition: service_healthy
      definition-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-oracle,docker}
      ORACLE_HOST: ${ORACLE_HOST:-host.docker.internal}
      ORACLE_PORT: ${ORACLE_PORT:-1521}
      ORACLE_SERVICE: ${ORACLE_SERVICE:-XE}
      ORACLE_USER: ${ORACLE_USER:-system}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-oracle}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      PROCESS_SERVER_PORT: ${PROCESS_SERVER_PORT:-8080}
      KEYCLOAK_URL: ${PROCESS_KEYCLOAK_URL:-http://localhost:8080}
      KEYCLOAK_REALM: ${PROCESS_KEYCLOAK_REALM:-uengine}
      KEYCLOAK_ADMIN_CLIENT_ID: ${PROCESS_KEYCLOAK_ADMIN_CLIENT_ID:-admin-cli}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST:-smtp.gmail.com}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-587}
      MAIL_SMTP_SSL_TRUST: ${MAIL_SMTP_SSL_TRUST:-smtp.gmail.com}
      MAIL_USERNAME: ${MAIL_USERNAME:-lee}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-123}
    networks:
      - release-network

  keycloak-gateway:
    image: keycloak-gateway:1.1.0
    container_name: release-gateway
    ports:
      - "${GATEWAY_HOST_PORT:-8088}:${GATEWAY_SERVER_PORT:-8080}"
    depends_on:
      definition-service:
        condition: service_started
      process-service:
        condition: service_started
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_CLIENT_SERVER_URL: ${KEYCLOAK_CLIENT_SERVER_URL:-http://keycloak:8080}
      KEYCLOAK_BROWSER_AUTH_URL: ${KEYCLOAK_BROWSER_AUTH_URL:-http://localhost:8080}
      KEYCLOAK_CLIENT_REALM: ${KEYCLOAK_CLIENT_REALM:-uengine}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-uengine}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-66LpF19OpkpgKKpWHdgiCEKisx5AXqLA}
      KEYCLOAK_REDIRECT_URI: ${KEYCLOAK_REDIRECT_URI:-http://localhost:8088/login/oauth2/code/keycloak}
      GATEWAY_URI: ${GATEWAY_URI:-http://localhost:8088}
      GATEWAY_SERVER_PORT: ${GATEWAY_SERVER_PORT:-8080}
      EXECUTION_SERVICE_URL: ${EXECUTION_SERVICE_URL:-http://localhost:8000}
      DEFINITION_SERVICE_URL: ${DEFINITION_SERVICE_URL:-http://definition-service:8080}
      PROCESS_SERVICE_URL: ${PROCESS_SERVICE_URL:-http://process-service:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://frontend:8080}
      SPRING_PROFILES_ACTIVE: ${GATEWAY_SPRING_PROFILES_ACTIVE:-docker}
    networks:
      - release-network

  frontend:
    image: process-gpt-vue3:1.4.0
    container_name: release-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:${FRONTEND_CONTAINER_PORT:-8080}"
    depends_on:
      - keycloak-gateway
    environment:
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8080}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-uengine}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-uengine}
    networks:
      - release-network

networks:
  release-network:
    driver: bridge
